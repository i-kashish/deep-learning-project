# config.yaml — Default hyperparameters for CNN Image Classifier

# Model
model:
  input_shape: [32, 32, 3]
  num_classes: 10
  filters: [32, 64, 128]
  dropout_rate: 0.4

# Training
training:
  epochs: 50
  batch_size: 128
  learning_rate: 0.001
  weight_decay: 0.0001
  warmup_epochs: 5
  patience: 10          # Early stopping patience

# Paths
paths:
  log_dir: logs
  ckpt_dir: checkpoints
